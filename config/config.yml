# VPS 服务商账号配置
providers:
  # 账号名可自定义，供 routes.provider_ref 引用
  hk-bwh:
    type: bandwagonhost
    api_id: "VEID"
    api_key: "API KEY"

# 对外暴露的订阅路由配置
routes:
  -
    # path 是完整对外路径，默认示例使用不带文件后缀的安装后访问路径
    path: "/route_prefix1/b1"
    # file 是 subscriptions 目录下的相对文件路径
    file: "b1.yaml"
    provider_ref: "hk-bwh"

    # 按需设置访问约束；未配置时不校验
    # access_control:
    #   user_agent: "ClashX"
    # 按需覆盖默认行为，不配置时使用系统默认值
    # usage_display:
    #   enable: true
